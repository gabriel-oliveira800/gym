name: gym
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  drift: ^2.22.0
  drift_flutter: ^0.2.0
  path_provider: ^2.1.5
  go_router: ^14.8.1
  lucide_icons: ^0.257.0
  flutter_tailwind: ^1.7.3
  auto_injector: ^2.1.1
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  drift_dev: ^2.22.0
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/gifs/
    - assets/previews/
    - assets/images/

flutter_launcher_icons:
  ios: true
  android: true
  image_path: "assets/images/icon.png"
